apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-api-config
  namespace: devops-backend
  labels:
    app.kubernetes.io/name: devops-api
    app.kubernetes.io/component: backend
data:
  PORT: "3000"
  DB_HOST: "<RDS_HOSTNAME>"
  DB_PORT: "5432"
  DB_NAME: "devdb"
  DB_USER: "devuser"
  DB_SSL: "true"

# NOTE: DB_HOST is dynamic and should be injected from the Terraform output during deployment.
# This placeholder must be replaced with the actual RDS endpoint from infrastructure provisioning.
